figure {

figure:hover {

    box-shadow: 0 12px 20px rgba(0,0,0,0.2);

    width: 100px;

    border-radius: 8px;
    background: #ecf0f1;
    padding: 4px;

  }
@keyframes pulse {

  function shuffleFigures() {
    const grid = document.getElementById('figuresGrid');
    grid.innerHTML = '';
    const shuffled = [...figuresData];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach(item => {
      const figure = document.createElement('figure');
      figure.innerHTML = `
        <a href="${item.href}" target="_blank" rel="noopener noreferrer">
          <img src="${item.src}" alt="${item.alt}" />
        </a>
        <figcaption>${item.caption}${item.subcaption ? `<p style="color: #c0c0c0;">${item.subcaption}</p>` : ''}</figcaption>
      `;
      grid.appendChild(figure);
    });
  }

  function filterFigures(keyword) {
    document.querySelectorAll("#figuresGrid figure").forEach(f => {
      const captionText = f.querySelector("figcaption").textContent.toLowerCase();
      if (captionText.includes(keyword.toLowerCase())) {
        f.style.display = "";
      } else {
        f.style.display = "none";
      }
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    shuffleFigures();

    // Search filter
    document.getElementById("searchInput").addEventListener("input", () => {
      const q = document.getElementById("searchInput").value.toLowerCase();
      document.querySelectorAll("#figuresGrid figure").forEach(f => {
        const txt = f.querySelector("figcaption").textContent.toLowerCase();
        f.style.display = txt.includes(q) ? "" : "none";
      });
    });

    // Small filter buttons for "Mutual Aid" and "Friday Film"
    document.querySelectorAll('.filter-tag').forEach(btn => {
      btn.onclick = () => {
        filterFigures(btn.dataset.filter);
      };
    });

    // These are the only filter buttons used
    document.querySelectorAll('.filter-tag').forEach(btn => {
      btn.onclick = () => {
        filterFigures(btn.dataset.filter);
      };
    });

    document.querySelectorAll('.filter-tag')[0].onclick = () => filterFigures("Mutual Aid");
    document.querySelectorAll('.filter-tag')[1].onclick = () => filterFigures("Friday Film");

    // "Mature Content" button
    document.getElementById("watchBtn").onclick = () => {
      window.open('https://gaze.cash/channel.html?chan=AAAAZw', '_blank');
    };

    // Load images
    const imgs = document.querySelectorAll('#figuresGrid img');
    let loadedCount = 0;
    const totalImgs = imgs.length;
    if (totalImgs === 0) {
      document.getElementById('loader').style.display='none';
      document.getElementById('main-content').style.display='block';
    } else {
      imgs.forEach(img => {
        if (img.complete) {
          incrementLoad();
        } else {
          img.onload = incrementLoad;
          img.onerror = incrementLoad;
        }
      });
    }

    function incrementLoad() {
      loadedCount++;
      if (loadedCount >= totalImgs) {
        document.getElementById('loader').style.display='none';
        document.getElementById('main-content').style.display='block';
      }
    }
  });
</script>
