<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Celsians Club</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-color: #F3DCA3;
    --text-color: #333;
    --shadow-color: rgba(0,0,0,0.1);
    --hover-shadow-color: rgba(0,0,0,0.2);
    --filter-tag-bg: #fff;
    --filter-tag-hover: #e0f7fa;
    --figure-bg: #F3DCA3;
    --figure-shadow: rgba(0,0,0,0.1);
    --caption-color: #606060;
    --blue-color: #66ccff; /* consistent blue color */
  }

  body.dark-mode {
    --bg-color: #121212;
    --text-color: #eee;
    --shadow-color: rgba(0,0,0,0.6);
    --hover-shadow-color: rgba(0,0,0,0.8);
    --filter-tag-bg: #333;
    --filter-tag-hover: #555;
    --figure-bg: #222;
    --figure-shadow: rgba(0,0,0,0.7);
    --caption-color: #aaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; cursor: pointer; }

  body {
    font-family: 'Ubuntu', Arial, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    display: flex;
    min-height: 100vh;
  }

  /* Sidebar styles */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    height: 100%;
    background: var(--figure-bg);
    box-shadow: 2px 0 4px var(--shadow-color);
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 140px;
    transition: width 0.3s;
    overflow: hidden;
    z-index: 1000;
  }
  #sidebar.collapsed {
    width: 40px;
  }

  /* Hide elements when sidebar is collapsed */
  #sidebar.collapsed h1,
  #sidebar.collapsed #categoriesContainer,
  #sidebar.collapsed #sidebar-search {
    display: none;
  }

  /* Mode toggle icon (top-right) remains the same */
  #mode-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 1.2em;
    background: none;
    border: none;
    cursor: pointer;
    z-index: 1100;
  }

  /* Search box styles - with large space above */
  #sidebar input[type="search"] {
    margin-top: 50px; /* More space above */
    width: 100%;
    padding: 8px 12px;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-family: 'Ubuntu', Arial, sans-serif;
    font-size: 14px;
  }
  #sidebar-search:focus {
    box-shadow: 0 0 8px rgba(10, 193, 142, 0.6);
    border-color: #0AC18E;
  }

  /* Title styling: hug the left, styled with fancy font and blue color */
  #main-title {
    font-family: 'Pacifico', cursive;
    font-size: 2em;
    margin-top: 20px;
    margin-bottom: 10px;
    margin-left: 0; /* Hug the left edge */
    color: var(--blue-color);
  }

  /* Category buttons container, hidden when sidebar is collapsed */
  #categoriesContainer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    margin-top: 10px;
  }
  .category-btn {
    padding: 8px 12px;
    font-family: 'Ubuntu', Arial, sans-serif;
    font-size: 1em;
    font-weight: bold;
    border: 1px solid #555;
    border-radius: 4px;
    background: var(--category-bg, #fff);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  #sidebar.collapsed .category-btn {
    padding: 8px;
    font-size: 0;
    border: none;
  }
  #sidebar.collapsed .category-btn span {
    display: none;
  }

  /* Main content styles */
#content {
  margin-left: 160px;
  padding: 20px;
  flex: 1;
  transition: margin-left 0.3s;
}
body.collapsed-sidebar #content {
  margin-left: 60px;
}

 /* Figures grid */
#figures {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

/* Figures styling */
figure {
  background: var(--figure-bg);
  border-radius: 12px;
  box-shadow: 0 4px 8px var(--figure-shadow);
  padding: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: 0.3s;
}
figure:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 20px rgba(0,0,0,0.7);
}
figure img {
  width: 100px;
  height: 100px;
  object-fit: contain;
  border-radius: 8px;
}
figcaption {
  margin-top: 8px;
  font-size: 0.75em;
  color: var(--caption-color);
  text-align: center;
}

/* Back to Top button styles */
#backToTop {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 50px;
  height: 50px;
  background: var(--blue-color); /* same blue as title */
  color: #fff;
  border: none;
  border-radius: 50%;
  font-size: 1.5em;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 8px var(--shadow-color);
  cursor: pointer;
}
#backToTop:hover {
  background: #55bbee;
  transform: scale(1.1);
}

/* Responsive video container */
.video-container {
  position: relative;
  width: 100%;
  max-width: 560px;
  aspect-ratio: 16/9;
  margin-top: 10px;
}
.video-container iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
}

/* Sidebar toggle button styles */
#sidebar-toggle {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 1101;
  background: transparent;
  border: none;
  font-size: 1.5em;
  cursor: pointer;
  padding: 5px;
  color: var(--text-color);
}
#sidebar-toggle:hover {
  color: #000;
}
</style>
</head>
<body>

    <button class="category-btn" data-filter="Commerce"><span>Commerce</span></button>

</div>

<!-- Main content -->
<div id="content">
  <!-- Hugging the left with styled font and blue color -->

  </div>
  <!-- Figures grid -->

<!-- Back to Top Button -->
<div id="backToTop">↑</div>

function shuffleArray(array) {
  for (let i=array.length-1; i>0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function populateFigures() {
  const container = document.getElementById('figures');
  container.innerHTML = '';
  figures.forEach(item => {
    const figure = document.createElement('figure');
    figure.setAttribute('data-category', item.caption);
    figure.innerHTML = `
      <a href="${item.href}" target="_blank" rel="noopener noreferrer">
        <img src="${item.src}" alt="${item.alt}">
      </a>
      <figcaption>${item.alt}</figcaption>
    `;
    container.appendChild(figure);
  });
}

function filterFigures(type, value) {
  document.querySelectorAll('#figures figure').forEach(fig => {
    const category = fig.dataset.category.toLowerCase();
    const alt = fig.querySelector('img').alt.toLowerCase();
    if (type === 'category') {
      if (value === 'All' || category === value.toLowerCase()) {
        fig.style.display = '';
      } else {
        fig.style.display = 'none';
      }
    } else if (type === 'search') {
      if (value === 'all' || category.includes(value) || alt.includes(value)) {
        fig.style.display = '';
      } else {
        fig.style.display = 'none';
      }
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  // Initialize in dark mode
  document.body.classList.add('dark-mode');

  // Mode toggle icon
  const modeToggle = document.getElementById('mode-toggle');
  modeToggle.innerHTML = '🌙';
  modeToggle.onclick = () => {
    document.body.classList.toggle('dark-mode');
    if (document.body.classList.contains('dark-mode')) {
      modeToggle.innerHTML = '🌙';
    } else {
      modeToggle.innerHTML = '☀️';
    }
  };

  // Populate figures
  shuffleArray(figures);
  populateFigures();
  filterFigures('category', 'All');

  // Sidebar search
  document.getElementById('sidebar-search').addEventListener('input', e => {
    filterFigures('search', e.target.value.toLowerCase());
  });

  // Category buttons
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.onclick = () => {
      filterFigures('category', btn.dataset.filter);
    };
  });

  // Sidebar toggle
  const sidebarToggleBtn = document.getElementById('sidebar-toggle');
  const sidebar = document.getElementById('sidebar');

  sidebarToggleBtn.onclick = () => {
    sidebar.classList.toggle('collapsed');
    document.body.classList.toggle('collapsed-sidebar');
  };

  // Back to top
  window.addEventListener('scroll', () => {
    document.getElementById('backToTop').style.display = (window.scrollY > 300) ? 'flex' : 'none';
  });
  document.getElementById('backToTop').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
});
</script>
