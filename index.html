function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function populateFigures() {
  const container = document.getElementById('figuresGrid');
  let html = '';
  figures.forEach(item => {
    html += `
      <figure>
        <a href="${item.href}" target="_blank" rel="noopener noreferrer">
          <img src="${item.src}" alt="${item.alt}">
        </a>
        <figcaption>${item.caption}${item.subcaption ? `<p style="color: #c0c0c0;">${item.subcaption}</p>` : ''}</figcaption>
      </figure>
    `;
  });
  container.innerHTML = html;
}

// Search filter
document.getElementById('search-input').addEventListener('input', () => {
  const query = document.getElementById('search-input').value.toLowerCase();
  document.querySelectorAll('#figuresGrid figure').forEach(fig => {
    const caption = fig.querySelector('figcaption').textContent.toLowerCase();
    fig.style.display = caption.includes(query) ? '' : 'none';
  });
});

// Tag filter
document.querySelectorAll('.tag').forEach(tag => {
  tag.onclick = () => {
    const filterVal = tag.dataset.filter.toLowerCase();
    document.querySelectorAll('#figuresGrid figure').forEach(fig => {
      const caption = fig.querySelector('figcaption').textContent.toLowerCase();
      if (filterVal === 'all' || caption.includes(filterVal)) {
        fig.style.display = '';
      } else {
        fig.style.display = 'none';
      }
    });
  };
});

// Particle background setup
const canvas = document.getElementById('particle-background');
const ctx = canvas.getContext('2d');

let particlesArray;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 1;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.color = 'rgba(0, 150, 255, 0.5)';
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0) this.x = canvas.width;
    if (this.x > canvas.width) this.x = 0;
    if (this.y < 0) this.y = canvas.height;
    if (this.y > canvas.height) this.y = 0;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
  }
}

function init() {
  particlesArray = [];
  for (let i = 0; i < 80; i++) {
    particlesArray.push(new Particle());
  }
}
init();

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let particle of particlesArray) {
    particle.update();
    particle.draw();
  }
  for (let a = 0; a < particlesArray.length; a++) {
    for (let b = a + 1; b < particlesArray.length; b++) {
      const dx = particlesArray[a].x - particlesArray[b].x;
      const dy = particlesArray[a].y - particlesArray[b].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 100) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0, 150, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animate);
}
animate();

// Populate figures on load
document.addEventListener('DOMContentLoaded', () => {
  shuffleArray(figures);
  populateFigures();
});
