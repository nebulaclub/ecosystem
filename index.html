  let currentFilter = "All";

  function shuffleFigures() {
    const grid = document.getElementById('figuresGrid');
    grid.innerHTML = '';
    const shuffled = [...figuresData];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    shuffled.forEach(item => {
      const figure = document.createElement('figure');
      figure.innerHTML = `
        <a href="${item.href}" target="_blank" rel="noopener noreferrer">
          <img src="${item.src}" alt="${item.alt}" />
        </a>
        <figcaption>${item.caption}${item.subcaption ? `<p style="color: #c0c0c0;">${item.subcaption}</p>` : ''}</figcaption>
      `;
      // Add data-filter attribute for filtering if needed
      figure.setAttribute('data-filter', item.subcaption || '');
      grid.appendChild(figure);
    });
  }

  function filterFigures(keyword) {
    currentFilter = keyword;
    document.querySelectorAll("#figuresGrid figure").forEach(f => {
      if (keyword === "All") {
        f.style.display = "";
      } else {
        const captionText = f.querySelector("figcaption").textContent.toLowerCase();
        f.style.display = captionText.toLowerCase().includes(keyword.toLowerCase()) ? "" : "none";
      }
    });
  }

  // Search filter
  document.getElementById("searchInput").addEventListener("input", () => {
    const q = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll("#figuresGrid figure").forEach(f => {
      const txt = f.querySelector("figcaption").textContent.toLowerCase();
      const matchesFilter = currentFilter === "All" || txt.toLowerCase().includes(currentFilter.toLowerCase());
      const matchesSearch = txt.includes(q);
      f.style.display = (matchesFilter && matchesSearch) ? "" : "none";
    });
  });

  // Filter buttons
  document.querySelectorAll('.filter-tag').forEach(btn => {
    btn.onclick = () => {
      filterFigures(btn.dataset.filter);
    };
  });

  // Gift Button Logic
  const giftBtn = document.getElementById("giftButton");
  const giftModal = document.getElementById("giftModal");
  const iframeOverlay = document.getElementById("iframeOverlay");
  const refillsIframe = document.getElementById("refillsIframe");
  const closeIframeBtn = document.getElementById("closeIframe");
  const closeGiftBtn = document.getElementById("closeGiftModal");
  const openExternalBtn = document.getElementById("openExternal");
  const openIframeBtn = document.getElementById("openIframe");

  giftBtn.onclick = () => {
    giftModal.style.display = "flex";
  };

  document.getElementById("closeGiftModal").onclick = () => {
    giftModal.style.display = "none";
  };

  // External link option
  openExternalBtn.onclick = () => {
    window.open('https://www.cryptorefills.com/', '_blank');
    giftModal.style.display = "none";
  };

  // Iframe view option
  openIframeBtn.onclick = () => {
    document.getElementById("iframeOverlay").style.display = "flex";
    refillsIframe.src = 'https://www.cryptorefills.com/';
    giftModal.style.display = "none";
  };

  // Close iframe overlay
  document.getElementById("closeIframe").onclick = () => {
    document.getElementById("iframeOverlay").style.display = "none";
    refillsIframe.src = "";
  };

  // Clicking outside iframe closes overlay
  document.getElementById("iframeOverlay").onclick = (e) => {
    if (e.target === document.getElementById("iframeOverlay")) {
      document.getElementById("iframeOverlay").style.display = "none";
      refillsIframe.src = "";
    }
  };

  // Initialize figures
  document.addEventListener("DOMContentLoaded", () => {
    shuffleFigures();
  });
</script>
