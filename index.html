<link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-color: #F3DCA3;
    --text-color: #333;
    --shadow-color: rgba(0,0,0,0.1);
    --hover-shadow-color: rgba(0,0,0,0.2);
    --filter-tag-bg: #fff;
    --filter-tag-hover: #e0f7fa;
    --figure-bg: #F3DCA3;
    --figure-shadow: rgba(0,0,0,0.1);
    --caption-color: #606060;
    --blue-color: #66ccff;
  }
  body.dark-mode {
    --bg-color: #121212;
    --text-color: #eee;
    --shadow-color: rgba(0,0,0,0.6);
    --hover-shadow-color: rgba(0,0,0,0.8);
    --filter-tag-bg: #333;
    --filter-tag-hover: #555;
    --figure-bg: #222;
    --figure-shadow: rgba(0,0,0,0.7);
    --caption-color: #aaa;
  }
  *:focus { outline: none; box-shadow: none; }
  * {
    box-sizing: border-box; margin: 0; padding: 0; cursor: default;
  }
  body {
    font-family: 'Ubuntu', Arial, sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    display: flex; min-height: 100vh;
  }
  #sidebar {
    position: fixed; top: 0; left: 0; height: 100%;
    background: var(--figure-bg);
    box-shadow: 2px 0 4px var(--shadow-color);
    padding: 10px; display: flex; flex-direction: column; align-items: center;
    width: 140px; overflow: hidden; z-index: 1000;
  }
  #mode-toggle {
    position: fixed; top: 10px; right: 10px; font-size: 1.2em;
    background: none; border: none; cursor: pointer; z-index: 1100;
  }
  #sidebar input[type="search"] {
    margin-top: 0; width: 100%; padding: 8px 12px; border-radius: 12px;
    border: 1px solid #ccc; font-family: 'Ubuntu'; font-size: 14px;
  }
  #sidebar-search:focus {
    box-shadow: 0 0 8px rgba(10, 193, 142, 0.6);
    border-color: #0AC18E;
  }
  #main-title {
    font-family: 'Pacifico', cursive; font-size: 2em; margin: 20px 0 10px 0; color: var(--blue-color);
  }
  #sidebar-title {
    font-family: 'Pacifico', cursive; font-size: 1.2em; text-align: center; margin: 10px 0 15px 0; color: var(--blue-color);
    letter-spacing: 1px; line-height: 1.2em; font-weight: normal;
  }
  #categoriesContainer {
    display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 10px;
  }
  .category-btn {
    padding: 8px 12px; font-family: 'Ubuntu'; font-size: 1em; font-weight: bold;
    border: 1px solid #555; border-radius: 4px; background: var(--category-bg, #fff);
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
  }
  #content {
    margin-left: 140px; padding: 20px; flex: 1;
  }
  #figures {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;
  }
  @media (min-width: 1200px) {
    #figures { grid-template-columns: repeat(6, 1fr); }
  }
  figure {
    background: var(--figure-bg); border-radius: 12px; box-shadow: 0 4px 8px var(--figure-shadow);
    padding: 10px; display: flex; flex-direction: row; align-items: flex-start; transition: 0.3s; cursor: pointer; position: relative;
  }
  figure:hover {
    transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.7);
  }
  figure a { display: flex; flex-direction: row; align-items: center; }
  figure img { width: 70px; height: 70px; object-fit: contain; border-radius: 8px; margin-right: 10px; }
  .fig-details {
    display: flex; flex-direction: column; justify-content: flex-start; flex: 1; position: relative;
  }
  .fig-text {
    display: flex; flex-direction: column;
  }
  figcaption {
    margin-top: 4px; font-size: 0.75em; font-weight: bold; color: var(--caption-color); text-align: left;
  }
  .stats {
    margin-top: 4px; font-size: 0.75em; font-style: italic; color: var(--caption-color);
  }
  /* hide stats initially, show when 'show-stats' class added */
  .fig-details .stats {
    display: none;
  }
  .show-stats .stats {
    display: block;
  }
  /* Fully updated "i" icon styles for subtlety - all figures */
  .info-icon {
    position: absolute; bottom: 8px; right: 8px;
    width: 16px; height: 16px; /* smaller size */
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; /* smaller font size */
    font-weight: normal; /* less bold */
    color: #222; 
    background: rgba(255,255,255,0.6); /* less opaque background for subtlety */
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    transition: background 0.2s, transform 0.2s, opacity 0.2s;
    opacity: 0.6; /* reduced opacity for subtlety */
  }
  .info-icon:hover {
    background: rgba(255,255,255,0.8);
    transform: scale(1.05);
    opacity: 1; /* full opacity on hover for better feedback */
  }
  #backToTop {
    position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px;
    background: var(--blue-color); color: #fff; border: none; border-radius: 50%; font-size: 1.5em;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px var(--shadow-color); cursor: pointer;
    transition: opacity 0.5s ease, transform 0.2s ease;
  }
  #backToTop.hidden {
    opacity: 0;
    pointer-events: none;
  }
  #backToTop:hover {
    background: #55bbee; transform: scale(1.1);
  }
  .message-container a {
    color: var(--blue-color); text-decoration: underline;
  }
</style>

function shuffleArray(array) {
  for (let i=array.length-1; i>0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function populateFigures() {
  const container = document.getElementById('figures');
  container.innerHTML = '';
  figures.forEach(item => {
    const figure = document.createElement('figure');
    figure.setAttribute('data-category', item.subcaption);
    figure.onclick = () => {
      figure.classList.toggle('show-stats');
    };

    // Build the inner HTML
    let figureHTML = `
      <a href="${item.href}" target="_blank" rel="noopener noreferrer">
        <img src="${item.src}">
      </a>
      <div class="fig-details">
        <div class="fig-text">
          <figcaption>${item.caption}</figcaption>
          <div class="stats">${item.stats || ''}</div>
        </div>
      </div>
    `;

    // Only add the "i" icon if stats exist
    if (item.stats && item.stats.trim() !== '') {
      figureHTML += `<div class="info-icon" title="Show/hide stats">i</div>`;
    }

    figure.innerHTML = figureHTML;

    // Add click handler for the "i" icon if it exists
    if (item.stats && item.stats.trim() !== '') {
      const infoIcon = figure.querySelector('.info-icon');
      infoIcon.onclick = (e) => {
        e.stopPropagation();
        figure.classList.toggle('show-stats');
      };
    }

    container.appendChild(figure);
  });
}

function filterFigures(type, value) {
  document.querySelectorAll('#figures figure').forEach(fig => {
    const category = fig.dataset.category.toLowerCase();
    const captionText = fig.querySelector('figcaption').innerText.toLowerCase();
    const statsText = fig.querySelector('.stats').innerText.toLowerCase();
    if (type === 'category') {
      if (value.toLowerCase() === 'all' || category === value.toLowerCase()) {
        fig.style.display = '';
      } else {
        fig.style.display = 'none';
      }
    } else if (type === 'search') {
      if (value === 'all' || category.includes(value) || captionText.includes(value) || statsText.includes(value)) {
        fig.style.display = '';
      } else {
        fig.style.display = 'none';
      }
    }
  });
}

const backBtn = document.getElementById('backToTop');

// Initially hide the button
backBtn.classList.add('hidden');

let hideTimeout = null;

document.addEventListener('DOMContentLoaded', () => {
  // Dark mode toggle
  document.body.classList.add('dark-mode');
  const modeToggle = document.getElementById('mode-toggle');
  modeToggle.innerHTML = '🌙';
  modeToggle.onclick = () => {
    document.body.classList.toggle('dark-mode');
    modeToggle.innerHTML = document.body.classList.contains('dark-mode') ? '🌙' : '☀️';
  };

  // Populate figures
  shuffleArray(figures);
  populateFigures();
  filterFigures('category', 'All');

  // Search filter
  document.getElementById('sidebar-search').addEventListener('input', e => {
    filterFigures('search', e.target.value.toLowerCase());
  });

  // Category buttons
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.onclick = () => { filterFigures('category', btn.dataset.filter); };
  });

  // Back to top fade out after scrolling stops
  // Button initially hidden
  backBtn.classList.add('hidden');

  window.addEventListener('scroll', () => {
    // Show the button when scrolling
    backBtn.classList.remove('hidden');

    // Clear previous timeout if any
    if (hideTimeout) {
      clearTimeout(hideTimeout);
    }
    // Set timeout to hide after 2 seconds of no scroll
    hideTimeout = setTimeout(() => {
      backBtn.classList.add('hidden');
    }, 2000);
  });

  // Back to top click
  document.getElementById('backToTop').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };
});
</script>
